name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Tag pushes (v0.1.1, v0.1.1-rc1, v0.1.1-pre0, ...): stamp package.json to the
      # tag's exact version, and mark the Release as a prerelease whenever the tag
      # has a prerelease suffix (anything after a hyphen).
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            npm version --no-git-tag-version "$TAG_VERSION"
          else
            echo "package.json version already matches tag ($TAG_VERSION); skipping."
          fi
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "RELEASE_TYPE=prerelease" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TYPE=release" >> "$GITHUB_ENV"
          fi

      # Everything else (push to main, or a manual run): stamp an auto-incrementing
      # dev version instead, e.g. 0.1.1-dev.42, so every build is uniquely numbered.
      - name: Set dev version
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          npm version --no-git-tag-version "${CURRENT_VERSION}-dev.${{ github.run_number }}"

      # Tag pushes: build the portable zip (electron-builder doesn't publish it —
      # the release itself, with auto-generated notes, is created in the next step).
      - name: Build portable zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npx electron-vite build
          npx electron-builder --win --publish never

      # Create the GitHub Release with notes auto-generated from commits since the
      # last tag (GitHub's built-in "What's Changed" + full-changelog link — no
      # changelog file to maintain), and attach the portable zip to it.
      - name: Create release with auto-generated notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$RELEASE_TYPE" = "prerelease" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG

      # Push to main / manual runs: build and upload the portable zip as a workflow
      # artifact only — never published as a public release.
      - name: Build (dev build)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:win

      - name: Upload portable zip artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: md-reader-windows-portable
          path: dist/*.zip
