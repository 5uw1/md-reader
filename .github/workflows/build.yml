name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Sync package version to tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      # Tag pushes: build and publish a GitHub Release with the portable .exe attached.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always

      # Manual runs (no tag): just build and upload the portable .exe as a workflow artifact.
      - name: Build (verify only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:win

      - name: Upload portable exe artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: md-reader-windows-portable
          path: dist/*.exe
