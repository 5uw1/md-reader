appId: com.mdreader.app
productName: MD Reader
directories:
  buildResources: build
files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
win:
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: '${productName}-${version}-portable.${ext}'
